     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(240,153,123);font-family:sans-serif;font-size:12px;"
     id="text49">+ bootstrap ALK iterations</text>
  <!-- Length composition object -->
  <rect
     x="370"
     y="240"
     width="360"
     height="72"
     rx="8"
     style="fill:rgb(68,68,65);stroke:rgb(180,178,169);stroke-width:0.5px;"
     id="rect51" />
  <text
     x="550"
     y="262"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(211,209,199);font-family:sans-serif;font-size:14px;font-weight:500;"
     id="text53">Length composition object</text>
  <text
     x="550"
