  <rect
     x="40"
     y="240"
     width="180"
     height="72"
     rx="8"
     style="fill:rgb(113,43,19);stroke:rgb(240,153,123);stroke-width:0.5px;"
     id="rect43" />
  <text
     x="130"
     y="262"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(245,196,179);font-family:sans-serif;font-size:14px;font-weight:500;"
     id="text45">Complete ALK object</text>
  <text
     x="130"
     y="280"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(240,153,123);font-family:sans-serif;font-size:12px;"
