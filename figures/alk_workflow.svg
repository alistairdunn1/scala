  <text
     x="130"
     y="78"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(133,183,235);font-family:sans-serif;font-size:12px;"
     id="text15">Aged otolith subsample</text>
  <!-- Fish sampling data -->
  <rect
     x="460"
     y="40"
     width="180"
     height="56"
     rx="8"
     style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"
     id="rect17" />
  <text
     x="550"
     y="60"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(181,212,244);font-family:sans-serif;font-size:14px;font-weight:500;"
     id="text19">Fish sampling data</text>
  <text
     x="550"
     y="78"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(133,183,235);font-family:sans-serif;font-size:12px;"
     id="text21">Lengths + strata</text>
  <!-- Row 2: create_alk and calculate_length_compositions -->
  <line
