     id="line59" />
  <line
     x1="550"
     y1="312"
     x2="550"
     y2="360"
     marker-end="url(#arrow)"
     style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"
     id="line61" />
  <line
     x1="550"
     y1="370"
     x2="460"
     y2="370"
     marker-end="url(#arrow)"
     style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"
     id="line63" />
  <!-- calculate_age_compositions -->
  <rect
     x="40"
     y="360"
     width="410"
     height="56"
     rx="8"
     style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px;"
     id="rect65" />
  <text
     x="245"
     y="380"
     text-anchor="middle"
