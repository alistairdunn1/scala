  <title
     id="title2">Otolith weight-based age composition workflow in scala</title>
  <desc
     id="desc4">A flowchart showing the otolith weight-based age composition workflow in scala: aged otolith data is used to fit a weight-age model via fit_weight_age(), ages are assigned to all fish via assign_ages_from_weight(), and scaled age compositions are calculated via calculate_age_compositions_from_weight().</desc>
