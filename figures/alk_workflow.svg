  <title
     id="title2">ALK-based age composition workflow in scala</title>
  <desc
     id="desc4">A flowchart showing the age-length key workflow in scala: raw age data is used to create a complete ALK via create_alk(), length compositions are calculated via calculate_length_compositions(), and the two are combined in calculate_age_compositions() to produce age compositions.</desc>
  <defs
     id="defs9">
    <marker
       id="arrow"
       viewBox="0 0 10 10"
       refX="8"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M2 1L8 5L2 9"
         fill="none"
         stroke="context-stroke"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round"
         id="path6" />
    </marker>
  </defs>
  <!-- Row 1: Inputs -->
  <!-- Raw age-length data -->
  <rect
     x="40"
     y="40"
     width="180"
     height="56"
     rx="8"
     style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"
     id="rect11" />
  <text
     x="130"
     y="60"
     text-anchor="middle"
     dominant-baseline="central"
     style="fill:rgb(181,212,244);font-family:sans-serif;font-size:14px;font-weight:500;"
